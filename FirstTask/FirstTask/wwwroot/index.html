<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" Content="width=device-width, initial-scale=1" />
    <title>File-Based Blog System - Simple UI</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 800px;
            margin: 20px auto;
        }

        button {
            margin: 5px;
            padding: 8px 15px;
            cursor: pointer;
        }

        #posts article {
            border-bottom: 1px solid #ccc;
            padding: 10px 0;
        }

        #categories, #tags {
            margin-top: 10px;
        }

        input[type="text"], textarea {
            padding: 6px;
            width: 100%;
            margin-bottom: 10px;
        }

        #createStatus {
            margin-top: 10px;
        }
    </style>
</head>
<body>
    <h1>File-Based Blog System</h1>

    <div>
        <button onclick="loadCategories()">Show All Categories</button>
        <button onclick="loadTags()">Show All Tags</button>
        <button onclick="loadAllPosts()">Show All Posts</button>
    </div>

    <div id="categories"></div>
    <div id="tags"></div>

    <div style="margin-top: 20px;">
        <input type="text" id="searchInput" placeholder="Search posts..." />
        <button onclick="searchPosts()">Search</button>
    </div>

    <hr />

    <div id="posts"></div>

    <hr />
    <h2>Create New Post</h2>
    <form id="createPostForm" onsubmit="createPost(event)">
        <input type="text" id="title" placeholder="Title" required />
        <textarea id="content" placeholder="Content" rows="5" required></textarea>
        <input type="text" id="category" placeholder="Category (e.g. Tech)" />
        <input type="text" id="tags" placeholder="Tags (comma separated)" />
        <label>
            <input type="checkbox" id="published" checked />
            Published
        </label><br />
        <button type="submit">Create Post</button>
    </form>
    <div id="createStatus"></div>

    <script>
        function loadAllPosts() {
            clearFilters();
            fetch('/api/posts')
                .then(res => res.json())
                .then(posts => displayPosts(posts));
        }

        function loadCategories() {
            clearFilters();
            fetch('/api/categories')
                .then(res => res.json())
                .then(categories => {
                    const container = document.getElementById('categories');
                    container.innerHTML = categories.map(cat =>
                        `<button onclick="filterByCategory('${encodeURIComponent(cat.name)}')">${cat.name}</button>`
                    ).join('');
                });
        }

        function loadTags() {
            clearFilters();
            fetch('/api/tags')
                .then(res => res.json())
                .then(tags => {
                    const container = document.getElementById('tags');
                    container.innerHTML = tags.map(tag =>
                        `<button onclick="filterByTag('${tag.name}')">${tag.name}</button>`
                    ).join('');
                });
        }

        function clearFilters() {
            document.getElementById('categories').innerHTML = '';
            document.getElementById('tags').innerHTML = '';
            document.getElementById('posts').innerHTML = '';
            document.getElementById('searchInput').value = '';
        }

        function displayPosts(posts) {
            const postsDiv = document.getElementById('posts');
            if (!posts || posts.length === 0) {
                postsDiv.innerHTML = '<p>No posts found.</p>';
                return;
            }
            postsDiv.innerHTML = posts.map(post =>
                `<article>
                            <h3>${post.title || post.Title}</h3>
                            <p>${post.Content || post.Content || ''}</p>
                            <small>Published: ${post.publishedDate || post.PublishedDate || ''}</small>
                        </article>`
            ).join('');
        }

        function filterByCategory(categoryName) {
            fetch(`/api/posts/category/${encodeURIComponent(categoryName)}`)
                .then(res => res.json())
                .then(posts => displayPosts(posts));
        }

        function filterByTag(tagName) {
            fetch(`/api/posts/tag/${encodeURIComponent(tagName)}`)
                .then(res => res.json())
                .then(posts => displayPosts(posts));
        }

        function searchPosts() {
            const keyword = document.getElementById('searchInput').value.trim();
            if (!keyword) return;
            fetch(`/api/search/${encodeURIComponent(keyword)}`)
                .then(res => {
                    if (!res.ok) {
                        alert('No posts found');
                        return [];
                    }
                    return res.json();
                })
                .then(posts => displayPosts(posts));
        }

        async function createPost(event) {
            event.preventDefault();

            const titleInput = document.getElementById('title');
            const contentInput = document.getElementById('content');
            const categoryInput = document.getElementById('category');
            const tagsInput = document.getElementById('tags');
            const publishedCheckbox = document.getElementById('published');
            const statusDiv = document.getElementById('createStatus');

            const title = titleInput?.value.trim() || '';
            const content = contentInput?.value.trim() || '';
            const category = categoryInput?.value.trim() || '';

            let tags = [];
            if (tagsInput && tagsInput.value) {
                tags = tagsInput.value.split(',').map(t => t.trim()).filter(t => t !== '');
            }

            const published = publishedCheckbox?.checked || false;

            if (!title || !content) {
                alert('Title and Content are required.');
                return;
            }

            const postData = {
                title,
                content,
                category,
                tags,
                published
            };

            try {
                const response = await fetch('/api/posts', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(postData)
                });

                if (response.ok) {
                    const result = await response.json();
                    statusDiv.style.color = 'green';
                    statusDiv.textContent = `✅ Post created successfully with slug: ${result.slug}`;
                    document.getElementById('createPostForm').reset();
                    loadAllPosts();
                } else {
                    const errorText = await response.text();
                    statusDiv.style.color = 'red';
                    statusDiv.textContent = '❌ Failed to create post: ' + errorText;
                }
            } catch (err) {
                statusDiv.style.color = 'red';
                statusDiv.textContent = '❌ Error: ' + err.message;
                console.error(err);
            }
        }





        loadAllPosts();
    </script>
</body>
</html>
